<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <g transform="translate(250, 250) rotate(45)">
    <!-- Left Diamond (Bottom-Left group, solid blue) -->
    <g transform="translate(-92, 92)">
      <rect x="-80" y="-80" width="160" height="160" fill="#0c6cfa" stroke="#000000" stroke-width="5" stroke-linejoin="round" />
    </g>

    <!-- Top Diamond (Top-Left group) -->
    <g transform="translate(-92, -92)">
      <!-- Fills -->
      <rect x="-80" y="-80" width="80" height="160" fill="#e2e5e6" stroke="none" />
      <rect x="0" y="-80" width="80" height="80" fill="#ffffff" stroke="none" />
      <rect x="0" y="0" width="80" height="80" fill="#e2e5e6" stroke="none" />
      <!-- Division Lines -->
      <line x1="0" y1="-80" x2="0" y2="80" stroke="#000000" stroke-width="5" stroke-linecap="round" />
      <line x1="0" y1="0" x2="80" y2="0" stroke="#000000" stroke-width="5" stroke-linecap="round" />
      <!-- Outline -->
      <rect x="-80" y="-80" width="160" height="160" fill="none" stroke="#000000" stroke-width="5" stroke-linejoin="round" />
    </g>

    <!-- Right Diamond (Top-Right group) -->
    <g transform="translate(92, -92)">
      <!-- Fills -->
      <rect x="-80" y="0" width="80" height="80" fill="#e2e5e6" stroke="none" />
      <rect x="0" y="0" width="80" height="80" fill="#ffffff" stroke="none" />
      <rect x="-80" y="-80" width="160" height="80" fill="#ffffff" stroke="none" />
      <!-- Division Lines -->
      <line x1="-80" y1="0" x2="80" y2="0" stroke="#000000" stroke-width="5" stroke-linecap="round" />
      <line x1="0" y1="0" x2="0" y2="80" stroke="#000000" stroke-width="5" stroke-linecap="round" />
      <!-- Outline -->
      <rect x="-80" y="-80" width="160" height="160" fill="none" stroke="#000000" stroke-width="5" stroke-linejoin="round" />
    </g>

    <!-- Bottom Diamond (Bottom-Right group) -->
    <g transform="translate(92, 92)">
      <!-- Fills -->
      <rect x="-80" y="-80" width="80" height="160" fill="#e2e5e6" stroke="none" />
      <rect x="0" y="-80" width="80" height="160" fill="#ffffff" stroke="none" />
      <!-- Division Lines -->
      <line x1="0" y1="-80" x2="0" y2="80" stroke="#000000" stroke-width="5" stroke-linecap="round" />
      <!-- Outline -->
      <rect x="-80" y="-80" width="160" height="160" fill="none" stroke="#000000" stroke-width="5" stroke-linejoin="round" />
    </g>
  </g>
</svg>
